# This is an example .goreleaser.yml file (YAML)
# It's strongly recommended to check the available fields running
# 'goreleaser init' or 'goreleaser --help'.
# https://goreleaser.com

project_name: emlgo

before:
  hooks:
    - go mod tidy

builds:
  - id: emlgo
    dir: .
    main: ./cmd/emlcli
    binary: emlcli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: emlgo
    format: tarball
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^test:'

release:
  github:
    owner: 23skdu
    name: emlgo
  draft: false
  prerelease: auto

announce:
  twitter:
    enabled: false